[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cellos"
version = "0.1.0"
description = "Human-governed AI orchestration system with deterministic task scheduling and agent routing"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
dependencies = [
    "aiosqlite>=0.20",
    "pydantic>=2.0",
    "click>=8.0",
    "rich",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[project.scripts]
cellos = "cellos.cli:main"
